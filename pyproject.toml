[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autoforge"
version = "2.0.0"
description = "AutoForge — AI-powered multi-agent development platform"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.84.0",
    "openai>=1.0",
    "google-genai>=1.0",
    "python-dotenv>=1.0.0",
    "rich>=13.0",
    "pyyaml>=6.0",
    "InquirerPy>=0.3.4",
    "tomli-w>=1.0",
    "aiosqlite>=0.20.0",
]

[project.scripts]
autoforge = "autoforge.cli.app:main"

[tool.setuptools.packages.find]
include = ["autoforge*"]

[tool.setuptools.package-data]
autoforge = ["data/**/*"]
